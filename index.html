<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>My App</title>
        <link rel="stylesheet" href="style.css">
        <script src="app.js"></script>
    </head>
    <body>
        <header>
            <div class="logo">WORDLE</div>
            <div class="header-stats">
                <span><strong>0</strong>Jugadas</span>
                <span><strong>0</strong>Victorias</span>
                <span><strong>0</strong>Rachas</span>
            </div>
        </header>

        <div class="message-wrap"><div class="message" id="message"></div></div>

        <div class="grid" id="grid"></div>

        <div class="keyboard" id="keyboard">
            <div class="kb-row" id="kb-row-0"></div>
            <div class="kb-row" id="kb-row-1"></div>
            <div class="kb-row" id="kb-row-2"></div>
        </div>

        
        <div class="modal-wrap" id="modal">
            <div class="modal">
                <div class="modal-emoji" id="modal-emoji">🎉</div>
                <div class="modal-title" id="modal-title">¡Felicidades!</div>
                <div class="modal-word" id="modal-word"></div>
                <div class="modal-meaning" id="modal-meaning"></div>
                <button class="modal-btn" id="modal-btn">Jugar de nuevo</button>
                <div class="modal-score" id="modal-score"></div>
            </div>
        </div>

    </body>
</html>
